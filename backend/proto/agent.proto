syntax = "proto3";

package api;

option go_package = "agent/pkg/api";

import "proto/nrpc.proto";

service ServerService {
  option (nrpc.serviceSubjectParams) = "nodeName";

  rpc GetServerName (ServerRequest) returns (ServerResponse);
}

message ServerRequest {
  string request_id = 1;
}

message ServerResponse {
  string server_name = 1;
}
