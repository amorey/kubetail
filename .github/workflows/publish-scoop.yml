name: publish-scoop

permissions:
  contents: read

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy"
        required: true
        type: string
      dry_run:
        description: "Dry run"
        required: false
        type: boolean
        default: true

jobs:
  winget-release:
    name: Release on winget
    runs-on: ubuntu-24.04
    steps:
      - name: Configure
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/cli/v}" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Download sha256 files
        id: release-info
        uses: robinraju/release-downloader@v1.12
        with:
          repository: kubetail-org/kubetail
          tag: ${{ format('cli/v{0}', steps.config.outputs.version) }}
          fileName: "kubetail-windows-*"

      - name: Extract shasums
        id: meta
        run: |
          AMD64_SHA256=$( tr -d '\r' < './kubetail-windows-amd64.sha256' | awk '{print $1}' )
          ARM64_SHA256=$( tr -d '\r' < './kubetail-windows-arm64.sha256' | awk '{print $1}' )

          echo "amd64_sha256=$AMD64_SHA256" >> $GITHUB_OUTPUT
          echo "arm64_sha256=$ARM64_SHA256" >> $GITHUB_OUTPUT

      - name: Checkout kubetail repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: .github/ci-config/scoop
          sparse-checkout-cone-mode: false
          path: kubetail

      - name: Checkout ScoopInstaller/Main repo
        uses: actions/checkout@v5
        with:
          repository: ScoopInstaller/Main
          fetch-depth: 1
          sparse-checkout: bucket/kubetail.json
          sparse-checkout-cone-mode: false
          path: ScoopInstaller-Main

      - name: Execute scoop manifest templates
        env:
          VERSION: ${{ steps.config.outputs.version }}
          AMD64_SHA256: ${{ steps.meta.outputs.amd64_sha256 }}
          ARM64_SHA256: ${{ steps.meta.outputs.arm64_sha256 }}
          SRC_DIR: kubetail/.github/ci-config/scoop
          DST_DIR: ScoopInstaller-Main/bucket
        run: |
          set -euo pipefail

          mkdir -p "${DST_DIR}"

          # kubetail.json
          envsubst '${VERSION} ${AMD64_SHA256} ${ARM64_SHA256}' \
            < "${SRC_DIR}/kubetail.json.tmpl" \
            > "${DST_DIR}/kubetail.json"

          if [ "${{ steps.config.outputs.dry_run }}" == "true" ]; then
            cat "${DST_DIR}"/kubetail.json
          fi

      - name: Commit and raise PR from forked repo
        uses: peter-evans/create-pull-request@v7.0.8
        if: ${{ steps.config.outputs.dry_run != 'true' }}
        with:
          token: ${{ secrets.PUBLISH_SCOOP_TOKEN }}
          path: ./ScoopInstaller-Main
          commit-message: "kubetail: Update to version ${{ steps.config.outputs.version }}"
          title: "kubetail: Update to version ${{ steps.config.outputs.version }}"
          body: "This PR updates kubetail to version ${{ steps.config.outputs.version }}."
          branch: scoop-release-kubetail-${{ steps.config.outputs.version }}
          base: master
          push-to-fork: kubetail-org/ScoopInstaller-Main
