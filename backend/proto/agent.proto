syntax = "proto3";

package agentpb;

option go_package = "common/agentpb";

import "google/protobuf/timestamp.proto";
import "proto/nrpc.proto";

service PodLogMetadata {
  option (nrpc.serviceSubjectParams) = "nodeName";

  rpc GetFileInfo (FileInfoRequest) returns (FileInfoResponse);
}

message FileInfoRequest {
  string namespace = 1;
  string pod_name = 2;
  string container_name = 3;
  string container_id = 4;
}

message FileInfoResponse {
  int64 size = 1;
  google.protobuf.Timestamp last_modified_at = 2;
}
