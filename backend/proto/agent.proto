syntax = "proto3";

package agentpb;

option go_package = "common/agentpb";

import "google/protobuf/timestamp.proto";
import "nrpc.proto";

service LogMetadata {
  option (nrpc.serviceSubjectParams) = "nodeName";

  rpc FileInfoList (FileInfoListRequest) returns (FileInfoListResponse) {
    option (nrpc.pollingEnabled) = true;
  };
}

message FileInfo {
  Metadata metadata = 1;
  int64 size = 2;
  google.protobuf.Timestamp last_modified_at = 3;  
}

message FileInfoListRequest {
  repeated string namespaces = 1;
}

message FileInfoListResponse {
  repeated FileInfo items = 1;
}

message Metadata {
  string namespace = 1;
  string pod_name = 2;
  string container_name = 3;
  string container_id = 4;
}
