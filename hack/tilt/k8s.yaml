---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loggen
  namespace: default
  labels:
    app.kubernetes.io/name: loggen
    app.kubernetes.io/instance: kubetail-demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: loggen
      app.kubernetes.io/instance: kubetail-demo
  replicas: 3
  revisionHistoryLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loggen
        app.kubernetes.io/instance: kubetail-demo
        app.kubernetes.io/version: "0.1.3"
    spec:
      containers:
      - name: loggen
        image: docker.io/kubetail/loggen:0.1.2
        resources:
          requests:
            memory: 10Mi
            cpu: 100m
          limits:
            memory: 20Mi
            cpu: 200m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loggen-ansi
  namespace: default
  labels:
    app.kubernetes.io/name: loggen
    app.kubernetes.io/instance: kubetail-demo-ansi
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: loggen
      app.kubernetes.io/instance: kubetail-demo-ansi
  replicas: 3
  revisionHistoryLimit: 10
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loggen
        app.kubernetes.io/instance: kubetail-demo-ansi
        app.kubernetes.io/version: "0.1.3"
    spec:
      containers:
      - name: loggen
        image: docker.io/kubetail/loggen:0.1.2
        args: ["-ansi"]
        resources:
          requests:
            memory: 10Mi
            cpu: 100m
          limits:
            memory: 20Mi
            cpu: 200m
---
