name: publish-winget

permissions:
  contents: read

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy"
        required: true
        type: string
      dry_run:
        description: "Dry run"
        required: false
        type: boolean
        default: true

jobs:
  winget-release:
    name: Release on winget
    runs-on: ubuntu-24.04
    steps:
      - name: Configure
        id: config
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/cli/v}" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Download sha256 files
        id: release-info
        uses: robinraju/release-downloader@v1.12
        with:
          repository: kubetail-org/kubetail
          tag: ${{ format('cli/v{0}', steps.config.outputs.version) }}
          fileName: "kubetail-windows*zip.sha256"

      - name: Extract shasums
        id: meta
        run: |
          AMD64_SHA=$( tr -d '\r' < './kubetail-windows-amd64.zip.sha256' | awk '{print $1}' )
          ARM64_SHA=$( tr -d '\r' < './kubetail-windows-arm64.zip.sha256' | awk '{print $1}' )

          echo "amd64_sha=$AMD64_SHA" >> $GITHUB_OUTPUT
          echo "arm64_sha=$ARM64_SHA" >> $GITHUB_OUTPUT

      - name: Sparse checkout only manifests
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/ci-config
          sparse-checkout-cone-mode: false
          fetch-depth: 1
          path: winget-manifests

      - name: Clone winget-pkgs upstream repo
        uses: actions/checkout@v4
        with:
          repository: microsoft/winget-pkgs
          path: winget-pkgs

      - name: Download yq package
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Copy manifests template to winget-pkgs
        run: |
          NEW_FOLDER='./winget-pkgs/manifests/k/Kubetail/Kubetail/${{ steps.config.outputs.version }}'
          mkdir -p "$NEW_FOLDER" 

          cp ./winget-manifests/.github/ci-config/winget/* "$NEW_FOLDER"/

      - name: Update manifests for release
        working-directory: winget-pkgs/manifests/k/Kubetail/Kubetail/${{ steps.config.outputs.version }}
        env:
          VERSION: ${{ steps.config.outputs.version }}
          BASE_PATH: https://github.com/kubetail-org/kubetail/releases/download
          AMD64_SHA: ${{ steps.meta.outputs.amd64_sha }}
          ARM64_SHA: ${{ steps.meta.outputs.arm64_sha }}
        run: |
          set -euo pipefail

          # update the installer yaml
          yq e ".PackageVersion = \"$VERSION\"" -i ./Kubetail.Kubetail.installer.yaml
          yq e ".Installers[0].InstallerUrl = \"${BASE_PATH}/cli%2Fv${VERSION}/kubetail-windows-amd64.zip\"" -i ./Kubetail.Kubetail.installer.yaml
          yq e ".Installers[1].InstallerUrl = \"${BASE_PATH}/cli%2Fv${VERSION}/kubetail-windows-arm64.zip\"" -i ./Kubetail.Kubetail.installer.yaml

          yq e ".Installers[0].InstallerSha256 = \"${AMD64_SHA}\"" -i ./Kubetail.Kubetail.installer.yaml
          yq e ".Installers[1].InstallerSha256 = \"${ARM64_SHA}\"" -i ./Kubetail.Kubetail.installer.yaml

          # update the locale and kubetail yaml
          yq e ".PackageVersion = \"$VERSION\"" -i ./Kubetail.Kubetail.locale.en-US.yaml
          yq e ".PackageVersion = \"$VERSION\"" -i ./Kubetail.Kubetail.yaml

      - name: Commit and raise PR from forked repo
        uses: peter-evans/create-pull-request@v7.0.8
        if: ${{ steps.config.outputs.dry_run != 'true' }}
        with:
          token: ${{ secrets.PUBLISH_WINGET_TOKEN }}
          path: ./winget-pkgs
          commit-message: "New version: Kubetail.Kubetail ${{ steps.config.outputs.version }}"
          title: "New version: Kubetail.Kubetail version ${{ steps.config.outputs.version }}"
          body: "This PR adds the manifest for Kubetail.Kubetail version ${{ steps.config.outputs.version }}."
          branch: winget-release-kubetail-${{ steps.config.outputs.version }}
          base: master
          push-to-fork: kubetail-org/winget-pkgs
