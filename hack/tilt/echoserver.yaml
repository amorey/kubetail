kind: Deployment
apiVersion: apps/v1
metadata:
  name: echoserver
  namespace: default
  labels:
    app.kubernetes.io/name: echoserver
    app.kubernetes.io/instance: kubetail-dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: echoserver
      app.kubernetes.io/instance: kubetail-dev
  replicas: 3
  revisionHistoryLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echoserver
        app.kubernetes.io/instance: kubetail-dev
    spec:
      containers:
      - name: echoserver
        #image: registry.k8s.io/echoserver:1.10
        image: gcr.io/google-containers/echoserver:1.10
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        resources: {}
