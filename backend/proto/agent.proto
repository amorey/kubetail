syntax = "proto3";

package agentpb;

option go_package = "common/agentpb";

import "google/protobuf/timestamp.proto";

service LogMetadata {
  rpc FileInfoList (FileInfoListRequest) returns (FileInfoListResponse);
  rpc FileInfoWatch (FileInfoWatchRequest) returns (stream FileInfoWatchEvent);
}

message FileInfo {
  Metadata metadata = 1;
  int64 size = 2;
  google.protobuf.Timestamp last_modified_at = 3;  
}

message FileInfoListRequest {
  repeated string namespaces = 1;
}

message FileInfoListResponse {
  repeated FileInfo items = 1;
}

message Metadata {
  string node_name = 1;
  string namespace = 2;
  string pod_name = 3;
  string container_name = 4;
  string container_id = 5;
}

message FileInfoWatchRequest {
  repeated string namespaces = 1;
}

message FileInfoWatchEvent {
  string type = 1;
  FileInfo object = 2;
}
